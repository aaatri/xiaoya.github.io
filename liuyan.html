<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言板</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 20px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            width: 100%;
            max-width: 600px;
        }
        h2 {
            text-align: center;
        }
        .input-group {
            margin-bottom: 10px;
        }
        .input-group label {
            display: block;
            font-weight: bold;
        }
        .input-group input, .input-group textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 16px;
        }
        .button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        .button:hover {
            background-color: #45a049;
        }
        .messages {
            margin-top: 20px;
        }
        .message {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        .message p {
            margin: 5px 0;
        }
        .message span {
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>留言板</h2>

    <div class="input-group">
        <label for="username">用户名</label>
        <input type="text" id="username" placeholder="请输入你的用户名">
    </div>

    <div class="input-group">
        <label for="content">留言内容</label>
        <textarea id="content" rows="4" placeholder="请输入你的留言"></textarea>
    </div>

    <button class="button" onclick="submitMessage()">发布留言</button>

    <div class="messages" id="messages"></div>
</div>

<script>
    const repo = 'https://github.com/aaatri/xiaoya.github.io/message-board';  // 替换为你的仓库名
    const branch = 'main';
    const filePath = 'data.json';
    const token = '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'; // 你的 GitHub API 访问令牌

    // 获取留言
    async function loadMessages() {
        const response = await fetch(`https://api.github.com/repos/${repo}/contents/${filePath}?ref=${branch}`);
        const data = await response.json();
        const content = atob(data.content);
        const messages = JSON.parse(content);

        const messagesDiv = document.getElementById('messages');
        messagesDiv.innerHTML = '';
        messages.forEach(message => {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message');
            messageDiv.innerHTML = `
                <p><strong>${message.username}</strong>: ${message.content}</p>
                <span>IP地址: ${message.ip} | 时间: ${message.timestamp}</span>
            `;
            messagesDiv.appendChild(messageDiv);
        });
    }

    // 生成伪IP地址
    function generateFakeIP() {
        return '192.168.' + Math.floor(Math.random() * 256) + '.' + Math.floor(Math.random() * 256);
    }

    // 提交留言
    async function submitMessage() {
        const username = document.getElementById('username').value;
        const content = document.getElementById('content').value;
        const ip = generateFakeIP();
        const timestamp = new Date().toLocaleString();

        if (username && content) {
            const newMessage = { username, content, ip, timestamp };

            // 获取现有留言
            const response = await fetch(`https://api.github.com/repos/${repo}/contents/${filePath}?ref=${branch}`);
            const data = await response.json();
            const contentBase64 = data.content;
            const sha = data.sha;
            const existingMessages = JSON.parse(atob(contentBase64));

            // 添加新留言
            existingMessages.push(newMessage);

            // 更新留言到 GitHub
            const updatedContent = btoa(JSON.stringify(existingMessages, null, 2));
            const result = await fetch(`https://api.github.com/repos/${repo}/contents/${filePath}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: 'Add new message',
                    content: updatedContent,
                    sha: sha,
                    branch: branch
                })
            });

            if (result.ok) {
                alert('留言已发布！');
                loadMessages();  // 重新加载留言
            } else {
                alert('发布失败，请检查权限和Token设置');
            }
        } else {
            alert('请填写用户名和留言内容');
        }
    }

    // 页面加载时获取留言
    window.onload = function() {
        loadMessages();
    };
</script>

</body>
</html>
