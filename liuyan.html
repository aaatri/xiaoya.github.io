<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言板</title>
    <style>
        /* 样式部分省略，与之前的类似 */
    </style>
</head>
<body>

<div class="container">
    <h2>留言板</h2>

    <div class="input-group">
        <label for="username">用户名</label>
        <input type="text" id="username" placeholder="请输入你的用户名">
    </div>

    <div class="input-group">
        <label for="content">留言内容</label>
        <textarea id="content" rows="4" placeholder="请输入你的留言"></textarea>
    </div>

    <button class="button" onclick="submitMessage()">发布留言</button>

    <div class="messages" id="messages"></div>
</div>

<script>
    const repo = 'https://github.com/aaatri/xiaoya.github.io';  // 替换为你的仓库
    const branch = 'main';
    const filePath = 'data.json';
    const token = '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'; // GitHub API Token

    // 获取留言
    async function loadMessages() {
        const response = await fetch(`https://api.github.com/repos/${repo}/contents/${filePath}?ref=${branch}`);
        const data = await response.json();
        const content = atob(data.content);
        const messages = JSON.parse(content);

        const messagesDiv = document.getElementById('messages');
        messagesDiv.innerHTML = '';
        messages.forEach(message => {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message');
            messageDiv.innerHTML = `
                <p><strong>${message.username}</strong>: ${message.content}</p>
                <span>IP地址: ${message.ip} | 时间: ${message.timestamp}</span>
            `;
            messagesDiv.appendChild(messageDiv);
        });
    }

    // 生成模拟IP地址
    function generateFakeIP() {
        return '192.168.' + Math.floor(Math.random() * 256) + '.' + Math.floor(Math.random() * 256);
    }

    // 提交留言
    async function submitMessage() {
        const username = document.getElementById('username').value;
        const content = document.getElementById('content').value;
        const ip = generateFakeIP();
        const timestamp = new Date().toLocaleString();

        if (username && content) {
            const newMessage = { username, content, ip, timestamp };

            // 先获取现有的留言
            const response = await fetch(`https://api.github.com/repos/${repo}/contents/${filePath}?ref=${branch}`);
            const data = await response.json();
            const contentBase64 = data.content;
            const sha = data.sha;
            const existingMessages = JSON.parse(atob(contentBase64));

            // 添加新留言
            existingMessages.push(newMessage);

            // 更新留言到GitHub
            const updatedContent = btoa(JSON.stringify(existingMessages, null, 2));
            const result = await fetch(`https://api.github.com/repos/${repo}/contents/${filePath}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: 'Add new message',
                    content: updatedContent,
                    sha: sha,
                    branch: branch
                })
            });

            if (result.ok) {
                alert('留言已发布！');
                loadMessages();  // 重新加载留言
            } else {
                alert('发布失败，请检查权限和Token设置');
            }
        } else {
            alert('请填写用户名和留言内容');
        }
    }

    // 页面加载时获取留言
    window.onload = function() {
        loadMessages();
    };
</script>

</body>
</html>
